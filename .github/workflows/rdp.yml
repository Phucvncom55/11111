# Auto-generated — AI STV
name: AI STV Windows VM
on:
  workflow_dispatch:
jobs:
  aistv-vm:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        instance_id: [1]
    runs-on: windows-latest
    timeout-minutes: 395
    steps:
      - name: AI STV Provision
        timeout-minutes: 25
        shell: pwsh
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
          INSTANCE_ID: ${{ matrix.instance_id }}
          MACHINE_COUNT: '1'
          VM_DURATION_MINUTES: '360'
        run: |

          $ErrorActionPreference = 'SilentlyContinue'
          $runTag = if ($env:GITHUB_RUN_ID) { $env:GITHUB_RUN_ID } else { Get-Random -Maximum 99999 }
          $tsName = if ($env:MACHINE_COUNT -eq '1') { "AISTV-$runTag" } else { "AISTV-$($env:INSTANCE_ID)-$runTag" }
          $tsExe = "$env:ProgramFiles\Tailscale\tailscale.exe"
          Write-Host "=== VM Provisioning Started (instance $($env:INSTANCE_ID)) ==="
          function Install-NetworkPkg {
            if (Test-Path -LiteralPath $tsExe) {
              Write-Host "Network: da cai san"
              return $true
            }
            $exe = Join-Path $env:RUNNER_TEMP "tailscale-setup.exe"
            Write-Host "Network: tai EXE installer..."
            try {
              Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-full-1.98.4.exe" -OutFile $exe -UseBasicParsing -TimeoutSec 120
              if (Test-Path -LiteralPath $exe) {
                $p = Start-Process -FilePath $exe -ArgumentList @("/quiet") -Wait -PassThru -NoNewWindow
                Write-Host "Network EXE exit $($p.ExitCode)"
                for ($w = 0; $w -lt 20; $w++) {
                  if (Test-Path -LiteralPath $tsExe) { break }
                  Start-Sleep -Seconds 2
                }
              }
            } catch {
              Write-Host "Network EXE loi: $($_.Exception.Message)"
            }
            if (Test-Path -LiteralPath $tsExe) { return $true }
            Write-Host "Network: fallback winget..."
            $wp = Start-Process -FilePath "winget.exe" -ArgumentList @(
              "install","--id","Tailscale.Tailscale","-e","--disable-interactivity",
              "--accept-source-agreements","--accept-package-agreements","--source","winget"
            ) -Wait -PassThru -NoNewWindow
            Write-Host "winget exit $($wp.ExitCode)"
            Start-Sleep -Seconds 5
            Start-Service -Name "Tailscale" -ErrorAction SilentlyContinue | Out-Null
            return (Test-Path -LiteralPath $tsExe)
          }
          if (-not (Install-NetworkPkg)) {
            Write-Host "Network: CAI DAT THAT BAI"
          }
          function Get-NetworkIPv4 {
            if (-not (Test-Path -LiteralPath $tsExe)) { return $null }
            try {
              $j = & $tsExe status --json 2>$null | ConvertFrom-Json
              if ($j.Self.Online -eq $true -and $j.Self.TailscaleIPs) {
                foreach ($a in $j.Self.TailscaleIPs) {
                  $s = "$a".Trim()
                  if ($s -match '^(100\.|10\.|172\.(1[6-9]|2[0-9]|3[01])\.)\d+\.\d+$' -or $s -match '^\d{1,3}(\.\d{1,3}){3}$') {
                    return $s
                  }
                }
              }
            } catch {}
            foreach ($line in @(& $tsExe ip -4 2>$null)) {
              $s = "$line".Trim()
              if ($s -match '^\d{1,3}(\.\d{1,3}){3}$') { return $s }
            }
            return $null
          }
          if ($env:TAILSCALE_AUTH_KEY -and (Test-Path -LiteralPath $tsExe)) {
            $tsKey = "$env:TAILSCALE_AUTH_KEY".Trim()
            Write-Host "Network: khoi dong service..."
            Set-Service -Name 'Tailscale' -StartupType Automatic -ErrorAction SilentlyContinue
            Restart-Service -Name 'Tailscale' -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 6
            Write-Host "Network: dang ket noi (hostname=$tsName)..."
            & $tsExe up --auth-key=$tsKey --hostname=$tsName --accept-routes --accept-dns=false --timeout=90s 2>&1 | ForEach-Object { Write-Host "net: $_" }
            $ip = 'pending'
            for ($t = 0; $t -lt 18; $t++) {
              $got = Get-NetworkIPv4
              if ($got) { $ip = $got; Write-Host "Network: IP=$ip"; break }
              if ($t -lt 3) { Start-Sleep -Seconds 3 } else { Start-Sleep -Seconds 5 }
            }
            if ($ip -eq 'pending') {
              Write-Host "Network: WARN — chua lay duoc IP (kiem tra auth key reusable + ACL)"
            }
          } elseif (Test-Path -LiteralPath $tsExe) {
            $ip = 'pending'
          } else {
            Write-Host "Network: khong co — dung IP public"
            $ip = (Invoke-RestMethod -Uri 'https://api.ipify.org?format=json' -TimeoutSec 30).ip
          }
          Write-Host "=== RDP setup ==="
          $vmUser = 'AISTV'
          $comp = $env:COMPUTERNAME
          $rdpTcp = 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Set-ItemProperty -Path $rdpTcp -Name 'UserAuthentication' -Value 0 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path $rdpTcp -Name 'SecurityLayer' -Value 0 -ErrorAction SilentlyContinue
          Enable-NetFirewallRule -DisplayGroup 'Remote Desktop' | Out-Null
          Set-Service -Name TermService -StartupType Automatic -ErrorAction SilentlyContinue
          Restart-Service -Name TermService -Force -ErrorAction SilentlyContinue
          $rand = -join ((48..57)+(65..90)+(97..122) | Get-Random -Count 42 | ForEach-Object { [char]$_ })
          $password = 'trongphuc_owr' + $rand
          Remove-LocalUser -Name 'githubvm' -ErrorAction SilentlyContinue
          $sec = ConvertTo-SecureString $password -AsPlainText -Force
          if (Get-LocalUser -Name $vmUser -ErrorAction SilentlyContinue) {
            Set-LocalUser -Name $vmUser -Password $sec -PasswordNeverExpires $true -ErrorAction SilentlyContinue
          } else {
            New-LocalUser -Name $vmUser -Password $sec -FullName 'AI STV VM' -PasswordNeverExpires -ErrorAction SilentlyContinue
          }
          $lu = Get-LocalUser -Name $vmUser -ErrorAction SilentlyContinue
          if ($lu) { $lu | Enable-LocalUser -ErrorAction SilentlyContinue }
          Add-LocalGroupMember -Group 'Administrators' -Member $vmUser -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group 'Remote Desktop Users' -Member $vmUser -ErrorAction SilentlyContinue
          $uok = $null -ne $lu
          $rdpListen = Get-NetTCPConnection -LocalPort 3389 -State Listen -ErrorAction SilentlyContinue
          Write-Host "User created: $vmUser (ok=$uok)"
          Write-Host "Computer: $comp"
          Write-Host "Login: $vmUser"
          Write-Host "Hostname: $tsName"
          Write-Host "IP: $ip"
          Write-Host "Username: $vmUser"
          Write-Host "Password: $password"
          Write-Host "RDP port 3389: $(if ($rdpListen) { 'LISTEN' } else { 'CHUA MO' })"
          Write-Host "=== VM Ready ==="
          $ws = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          $credsPath = Join-Path $ws 'vm-creds.json'
          @{
            hostname = $tsName
            ip = $ip
            username = $vmUser
            password = $password
            computer = $comp
            login = $vmUser
            instance_id = $env:INSTANCE_ID
          } | ConvertTo-Json | Set-Content -LiteralPath $credsPath -Encoding utf8
          if (-not (Test-Path -LiteralPath $credsPath)) {
            Write-Error "vm-creds.json not created"
            exit 1
          }
          exit 0

      - name: Upload VM credentials
        uses: actions/upload-artifact@v4
        with:
          name: aistv-creds-${{ matrix.instance_id }}
          path: vm-creds.json
          if-no-files-found: warn
          retention-days: 1
      - name: AI STV Keep-Alive
        shell: pwsh
        env:
          INSTANCE_ID: ${{ matrix.instance_id }}
          MACHINE_COUNT: '1'
          VM_DURATION_MINUTES: '360'
        run: |

          $ErrorActionPreference = 'SilentlyContinue'
          $mins = [int]$env:VM_DURATION_MINUTES
          if ($mins -lt 1) { $mins = 30 }
          Write-Host "=== VM Keep-Alive $mins phut (instance $($env:INSTANCE_ID)) ==="
          $deadline = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 60
          }
          Write-Host "=== VM Session Ended (instance $($env:INSTANCE_ID)) ==="
          exit 0

